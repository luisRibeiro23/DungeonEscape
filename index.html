<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dungeon Escape</title>

    <!-- CSS -->

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/game.css">

</head>

<body>

    <!-- MENU INICIAL -->

    <div id="menu-screen">

        <div class="menu-title-wrapper">

            <span class="menu-subtitle">— A dungeon awaits —</span>

            <h1>Dungeon Escape</h1>

            <div class="menu-divider"></div>

        </div>

        <div id="high-score-display">
            🏆 High Score: 0
        </div>

        <!-- SELEÇÃO DE DIFICULDADE -->

        <div id="difficulty-selector">

            <p>Dificuldade</p>

            <div id="difficulty-buttons">

                <button
                    class="difficulty-btn"
                    data-difficulty="easy">
                    Fácil
                </button>

                <button
                    class="difficulty-btn selected"
                    data-difficulty="normal">
                    Normal
                </button>

                <button
                    class="difficulty-btn"
                    data-difficulty="hard">
                    Difícil
                </button>

            </div>

        </div>

        <button id="start-button">
            Iniciar Jogo
        </button>

    </div>

    <!-- JOGO -->

    <div id="game-container">

        <!-- HUD -->

        <div id="hud">

            <div id="life">
                ❤️ Vida: 3
            </div>

            <div id="score">
                ⭐ Score: 0
            </div>

            <div id="level">
                🏰 Fase: 1
            </div>

        </div>

        <!-- ÁREA DO JOGO -->

        <div id="game-area">

            <!-- PLAYER -->

            <div id="player"></div>

            <!-- PORTA -->

            <div id="door"></div>

        </div>

    </div>

    <!-- PAUSA -->

    <div id="pause-screen">

        <h1>PAUSADO</h1>

        <button id="resume-button">
            Continuar
        </button>

        <button id="restart-button-pause"
                onclick="location.reload()">
            Menu Principal
        </button>

    </div>

    <!-- GAME OVER -->

    <div id="game-over-screen">

        <h1>GAME OVER</h1>

        <p id="final-score">Pontuação: 0</p>

        <button id="restart-button">
            Jogar Novamente
        </button>

    </div>

    <!-- VITÓRIA -->

    <div id="victory-screen">

        <h1>VOCÊ VENCEU! 🏆</h1>

        <p id="victory-score">Pontuação: 0</p>

        <p id="new-record">
            🎉 Novo Recorde!
        </p>

        <button id="victory-restart-button">
            Jogar Novamente
        </button>

    </div>

    <!-- JS -->

    <script type="module" src="js/main.js"></script>

</body>

</html>
